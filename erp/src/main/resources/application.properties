spring.application.name=erp

# Database — ALL values from env vars (no hardcoded defaults for secrets)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/healthcare_erp}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}

# Hibernate settings
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration — MUST be set via env variable!
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Encryption key for sensitive fields — MUST be set via env variable!
encryption.key=${ENCRYPTION_KEY}

# Enable async (for audit logging)
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5