spring.application.name=erp
# The address of your Docker database
spring.datasource.url=jdbc:postgresql://localhost:5432/healthcare_erp
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# Hibernate settings (This helps create tables automatically for now)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration — use env variable in production!
jwt.secret=${JWT_SECRET:healthcare-erp-super-secret-key-that-is-at-least-256-bits-long-for-security}
jwt.expiration=86400000

# Encryption key for sensitive fields — use env variable in production!
encryption.key=${ENCRYPTION_KEY:healthcare-erp-encryption-key-32b!}

# Enable async (for audit logging)
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5