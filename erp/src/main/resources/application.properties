spring.application.name=erp

# Database — ALL values from env vars (no hardcoded defaults for secrets)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/healthcare_erp}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}

# Hibernate settings
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration — MUST be set via env variable!
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Encryption key for sensitive fields — MUST be set via env variable!
encryption.key=${ENCRYPTION_KEY}

# Enable async (for audit logging)
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5

# ── Phase 2: Actuator ──
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true
info.app.name=Healthcare ERP
info.app.version=1.0.0
info.app.phase=2 - Production Polish

# ── Phase 2: Swagger/OpenAPI ──
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# ── Phase 2: Pagination defaults ──
spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100