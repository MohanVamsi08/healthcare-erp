spring.application.name=erp
# The address of your Docker database
spring.datasource.url=jdbc:postgresql://localhost:5432/healthcare_erp
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# Hibernate settings (This helps create tables automatically for now)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration — MUST be set via env variable!
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Encryption key for sensitive fields — MUST be set via env variable!
encryption.key=${ENCRYPTION_KEY}

# Enable async (for audit logging)
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5