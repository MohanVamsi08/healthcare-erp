# Test-only overrides — H2 in-memory database (no PostgreSQL required)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Let Hibernate create schema from entities (skip Flyway in tests)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Disable Flyway in test profile (migrations use PostgreSQL-specific syntax)
spring.flyway.enabled=false

# Safe test-only values (NOT used in production)
jwt.secret=test-only-jwt-secret-key-that-is-at-least-256-bits-long-for-unit-testing-purposes-only
jwt.expiration=86400000
encryption.key=test-only-encryption-key-32b!!

spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5
