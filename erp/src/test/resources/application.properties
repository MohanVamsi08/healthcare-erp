# Test-only overrides — these are NOT production secrets
spring.datasource.url=jdbc:postgresql://localhost:5432/healthcare_erp
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Safe test-only values (NOT used in production)
jwt.secret=test-only-jwt-secret-key-that-is-at-least-256-bits-long-for-unit-testing-purposes-only
jwt.expiration=86400000
encryption.key=test-only-encryption-key-32b!!

spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5
